<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galerie — Chez Denise</title>
<script>(function(){try{var l=localStorage.getItem('lang');if(l)document.documentElement.lang=l;}catch(e){}}());</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #faf8f3;
    --ink:     #1a1612;
    --muted:   #7a7268;
    --accent:  #b8975a;
    --accent2: #d4b896;
    --soft:    #f0e8d8;
    --fd:      'Cormorant Garamond', Georgia, serif;
    --fb:      'Jost', system-ui, sans-serif;
    --ease:    cubic-bezier(0.16, 1, 0.3, 1);
    --spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  html { scroll-behavior: smooth; font-size: 16px; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--fb); line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4 { font-family: var(--fd); line-height: 1.1; letter-spacing: -0.02em; }
  h1 { font-size: clamp(2.4rem, 6vw, 5rem); font-weight: 400; }
  h2 { font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 400; margin-bottom: 1rem; }
  h3 { font-size: clamp(1.2rem, 2.5vw, 1.6rem); font-weight: 600; margin-bottom: .5rem; }
  p  { color: var(--muted); max-width: 60ch; line-height: 1.75; }
  a  { color: var(--accent); text-decoration: none; }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center;
    padding: 1.2rem 5vw;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid color-mix(in srgb, var(--ink) 8%, transparent);
    transition: background .4s;
    gap: 1rem;
  }
  .nav-logo { font-family: var(--fd); font-size: 1.4rem; color: var(--ink); flex-shrink: 0; }
  .nav-links-wrap {
    flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; display: flex; align-items: center;
  }
  .nav-links-wrap::-webkit-scrollbar { display: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; flex-wrap: nowrap; }
  .nav-links a {
    color: var(--muted); font-size: .9rem; letter-spacing: .05em;
    text-transform: uppercase; transition: color .3s;
    position: relative; white-space: nowrap;
  }
  .nav-links a::after {
    content: ""; position: absolute; left:0; bottom:-2px;
    width:100%; height:1px; background: var(--accent);
    transform: scaleX(0); transform-origin: left;
    transition: transform .4s var(--ease);
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* Language switcher */
  .lang-switcher { display: flex; gap: .35rem; flex-shrink: 0; }
  .lang-btn {
    background: none; border: 1px solid color-mix(in srgb, var(--ink) 20%, transparent);
    border-radius: 6px; padding: .22em .6em; font-size: .75rem;
    font-family: var(--fb); letter-spacing: .06em; cursor: pointer;
    color: var(--muted); transition: all .2s;
  }
  .lang-btn:hover { color: var(--ink); border-color: var(--accent); }
  .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  @media (max-width: 640px) {
    nav { flex-wrap: wrap; padding: .8rem 5vw 0; gap: 0; }
    .nav-logo { padding-bottom: .6rem; }
    .lang-switcher { margin-left: auto; margin-bottom: .6rem; }
    .nav-links-wrap {
      width: 100%; flex: none;
      border-top: 1px solid color-mix(in srgb, var(--ink) 8%, transparent);
      padding: .45rem 0 .65rem;
    }
    .nav-links { gap: 1.6rem; }
    /* Taller two-row nav on mobile — push the first section down so the
       heading isn't hidden behind the fixed bar. */
    section.page-top { padding-top: 11rem !important; }
  }

  /* Sections */
  section { padding: clamp(4rem,10vw,8rem) 5vw; }
  .section-label {
    font-size: .75rem; letter-spacing: .2em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 1rem; display: block;
  }
  .container { width: min(100%, 1100px); margin-inline: auto; }

  /* Carousel */
  .carousel { margin-top: 3rem; }
  .carousel-stage {
    position: relative; width: 100%; aspect-ratio: 3/2;
    border-radius: 16px; overflow: hidden; background: var(--soft);
    box-shadow: 0 28px 56px -30px rgba(0,0,0,.4);
  }
  .carousel-track { position: absolute; inset: 0; }
  .carousel-slide {
    position: absolute; inset: 0; opacity: 0; cursor: zoom-in;
    transition: opacity .7s var(--ease); pointer-events: none;
  }
  .carousel-slide.active { opacity: 1; pointer-events: auto; }
  .carousel-slide img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .carousel-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%; border: none; z-index: 3;
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    color: var(--ink); font-size: 1.6rem; line-height: 1; cursor: pointer;
    display: grid; place-items: center; backdrop-filter: blur(6px);
    transition: background .25s, color .25s, transform .25s;
  }
  .carousel-btn:hover { background: var(--accent); color: #fff; transform: translateY(-50%) scale(1.08); }
  .carousel-btn.prev { left: 1rem; }
  .carousel-btn.next { right: 1rem; }
  .carousel-counter {
    position: absolute; bottom: 1rem; right: 1.2rem; z-index: 3;
    font-size: .8rem; letter-spacing: .05em; color: #fff;
    background: rgba(0,0,0,.45); padding: .25em .75em; border-radius: 999px;
    backdrop-filter: blur(4px);
  }
  @media (max-width: 600px) {
    .carousel-btn { width: 40px; height: 40px; font-size: 1.3rem; }
    .carousel-btn.prev { left: .6rem; }
    .carousel-btn.next { right: .6rem; }
  }

  /* Thumbnail strip (all photos, smaller, below the carousel) */
  .thumbs {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
    gap: .6rem; margin-top: 1.6rem;
  }
  .thumb {
    border: none; padding: 0; cursor: pointer; border-radius: 9px;
    overflow: hidden; aspect-ratio: 1/1; background: var(--soft);
    opacity: .6; outline: 2px solid transparent; outline-offset: 2px;
    transition: opacity .3s var(--ease), transform .3s var(--ease), outline-color .3s, box-shadow .3s;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb:hover { opacity: 1; transform: translateY(-2px); }
  .thumb.active {
    opacity: 1; outline-color: var(--accent);
    box-shadow: 0 8px 18px -10px rgba(0,0,0,.5);
  }
  @media (max-width: 600px) {
    .thumbs { grid-template-columns: repeat(auto-fill, minmax(62px, 1fr)); gap: .45rem; }
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,.88); padding: 4vh 4vw;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%; max-height: 100%; border-radius: 8px;
    box-shadow: 0 24px 64px -16px rgba(0,0,0,.6);
    opacity: 0; transform: scale(.96); transition: opacity .35s var(--ease), transform .35s var(--ease);
  }
  .lightbox.open img { opacity: 1; transform: scale(1); }
  .lightbox-close {
    position: absolute; top: 1.5rem; right: 2rem;
    color: #fff; font-size: 2.4rem; line-height: 1; cursor: pointer;
    opacity: .8; transition: opacity .2s;
  }
  .lightbox-close:hover { opacity: 1; }

  /* Footer */
  footer {
    padding: 3rem 5vw; text-align:center;
    border-top: 1px solid color-mix(in srgb,var(--ink) 8%,transparent);
    color: var(--muted); font-size:.85rem;
  }

  /* Reveal animation (driven by JS) */
  .reveal {
    opacity:0; transform: translateY(32px);
    transition: opacity .8s var(--ease), transform .8s var(--ease);
  }
  .reveal.in { opacity:1; transform: none; }
  .reveal.d1 { transition-delay:.08s; }
  .reveal.d2 { transition-delay:.16s; }
  .reveal.d3 { transition-delay:.24s; }
  .reveal.d4 { transition-delay:.32s; }

  /* Respect reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation:none !important; transition:none !important; }
    .reveal { opacity:1; transform:none; }
  }
</style>
</head>
<body>

<footer><span data-fr="© Chez Denise · Paris · Tous droits réservés" data-en="© Chez Denise · Paris · All rights reserved">© Chez Denise · Paris · Tous droits réservés</span></footer>

<script>
function setLang(lang) {
  localStorage.setItem('lang', lang);
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-fr]').forEach(function(el) {
    var t = el.getAttribute('data-' + lang);
    if (t !== null) el.textContent = t;
  });
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.id === 'btn-' + lang);
  });
}

(function(){
  if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){
    document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('in');});
  } else {
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
      });
    },{threshold:0.12, rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.reveal').forEach(function(el){ io.observe(el); });
  }

  // Lightbox
  var lightbox = document.createElement('div');
  lightbox.className = 'lightbox';
  lightbox.innerHTML = '<span class="lightbox-close">&times;</span><img>';
  document.body.appendChild(lightbox);
  var lightboxImg = lightbox.querySelector('img');
  function openLightbox(src, alt){
    lightboxImg.src = src;
    lightboxImg.alt = alt || '';
    lightbox.classList.add('open');
  }
  function closeLightbox(){ lightbox.classList.remove('open'); }
  lightbox.addEventListener('click', closeLightbox);

  // Carousel + thumbnail navigation. Photo order is curated (food shots
  // separated by décor/ambiance shots), so it is kept fixed — no shuffle.
  var track = document.getElementById('carousel-track');
  if (track) {
    var slides = Array.prototype.slice.call(track.children);
    var total = slides.length;
    var index = 0;
    var counter = document.getElementById('car-counter');
    var thumbsWrap = document.getElementById('thumbs');
    var thumbs = [];

    slides.forEach(function(slide, i){
      var img = slide.querySelector('img');

      // Build the matching thumbnail.
      var t = document.createElement('button');
      t.className = 'thumb';
      t.setAttribute('aria-label', 'Photo ' + (i + 1));
      var ti = document.createElement('img');
      ti.src = img.getAttribute('src');
      ti.alt = img.getAttribute('alt') || '';
      ti.loading = 'lazy';
      t.appendChild(ti);
      t.addEventListener('click', function(){ go(i); restart(); });
      thumbsWrap.appendChild(t);
      thumbs.push(t);

      // Click the big image to open it full-size.
      slide.addEventListener('click', function(){ openLightbox(img.src, img.alt); });
    });

    function render(){
      slides.forEach(function(s, i){ s.classList.toggle('active', i === index); });
      thumbs.forEach(function(t, i){ t.classList.toggle('active', i === index); });
      counter.textContent = (index + 1) + ' / ' + total;
      var at = thumbs[index];
      if (at && at.scrollIntoView) at.scrollIntoView({block:'nearest', inline:'nearest'});
    }
    function go(i){ index = (i + total) % total; render(); }
    render();

    document.getElementById('car-prev').addEventListener('click', function(){ go(index - 1); restart(); });
    document.getElementById('car-next').addEventListener('click', function(){ go(index + 1); restart(); });

    var timer = setInterval(function(){ go(index + 1); }, 5000);
    function restart(){ clearInterval(timer); timer = setInterval(function(){ go(index + 1); }, 5000); }

    var stage = track.parentNode;
    stage.addEventListener('mouseenter', function(){ clearInterval(timer); });
    stage.addEventListener('mouseleave', restart);

    document.addEventListener('keydown', function(e){
      if (lightbox.classList.contains('open')) {
        if (e.key === 'Escape') closeLightbox();
        return;
      }
      if (e.key === 'ArrowLeft'){ go(index - 1); restart(); }
      if (e.key === 'ArrowRight'){ go(index + 1); restart(); }
    });
  }

  setLang(localStorage.getItem('lang') || 'fr');
})();
</script>
